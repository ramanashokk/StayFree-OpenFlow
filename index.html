<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayFree OpenFlow</title>
<meta name="description" content="AI-powered voice dictation. Free forever. No subscriptions.">
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0B0C0E; color: #EAEAF0;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #6366F1, #818CF8);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #fff;
    margin-bottom: 4px;
  }
  p { font-size: 13px; color: #6B6C78; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid #2A2B32;
    border-top-color: #6366F1;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-top: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="logo">SF</div>
<p>Loading OpenFlow…</p>
<div class="spinner"></div>

<script>
  (function () {
    location.replace('mobile.html');
  })();
</script>
</body>
</html>
