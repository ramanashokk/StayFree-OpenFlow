<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayFree OpenFlow — Voice Dictation, Free Forever</title>
<meta name="description" content="AI-powered voice dictation. Free forever. No subscriptions.">
<link rel="manifest" href="manifest.json" />
<style>
  /* ── Design tokens ── */
  :root {
    --bg:        #0B0C0E;
    --surface:   #141518;
    --surface2:  #1C1D22;
    --border:    #2A2B32;
    --text:      #EAEAF0;
    --muted:     #6B6C78;
    --accent:    #6366F1;   /* indigo — OpenFlow identity color */
    --accent2:   #818CF8;
    --danger:    #EF4444;
    --green:     #22C55E;
    --amber:     #F59E0B;
    --radius:    14px;
    --radius-sm: 8px;
    --font-ui:   'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --shadow:    0 8px 32px rgba(0,0,0,0.5);
    --glow:      0 0 20px rgba(99,102,241,0.35);
  }
  .light {
    --bg:        #F5F6FA;
    --surface:   #FFFFFF;
    --surface2:  #EEEEF5;
    --border:    #D9DAE6;
    --text:      #111118;
    --muted:     #8E8FA0;
    --shadow:    0 4px 20px rgba(0,0,0,0.10);
    --glow:      0 0 20px rgba(99,102,241,0.20);
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: width .25s, transform .25s;
    z-index: 10;
  }
  .sidebar.collapsed { width: 60px; min-width: 60px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Sidebar header ── */
  .sb-header {
    padding: 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 32px; height: 32px; min-width: 32px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    box-shadow: 0 2px 8px rgba(99,102,241,0.4);
    letter-spacing: -1px;
  }
  .logo-text { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; }
  .logo-text span { color: var(--accent2); }
  .logo-sub { font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 1px; }

  /* ── Nav ── */
  .sb-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 6px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: 8px 8px 4px; white-space: nowrap; overflow: hidden; }
  .sidebar.collapsed .nav-label { opacity: 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--radius-sm);
    font-size: 13.5px; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: background .15s, color .15s;
    white-space: nowrap; overflow: hidden;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(99,102,241,.15); color: var(--accent2); }
  .nav-item .icon { font-size: 16px; min-width: 20px; text-align: center; }
  .nav-item .label { flex: 1; }
  .nav-item .badge {
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 99px; min-width: 18px; text-align: center;
  }
  .sidebar.collapsed .label, .sidebar.collapsed .badge, .sidebar.collapsed .nav-label { display: none; }

  /* ── Topbar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px; min-height: 56px;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; color: var(--muted);
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn-icon:hover { background: var(--border); color: var(--text); }

  /* ── Main content ── */
  .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Record zone ── */
  .record-zone {
    padding: 28px 28px 16px;
    border-bottom: 1px solid var(--border);
  }
  .rz-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px; }
  .rz-center { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .mic-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; cursor: pointer;
    transition: all .2s ease;
    position: relative; outline: none;
  }
  .mic-btn:hover { border-color: var(--accent); background: rgba(99,102,241,.1); }
  .mic-btn.recording {
    background: rgba(239,68,68,.12);
    border-color: var(--danger);
    animation: pulse-ring 1.4s ease infinite;
    box-shadow: 0 0 0 0 rgba(239,68,68,.5);
  }
  .mic-btn.processing {
    background: rgba(99,102,241,.12);
    border-color: var(--accent);
    animation: spin-glow 1s linear infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0   rgba(239,68,68,.5); }
    70%  { box-shadow: 0 0 0 16px rgba(239,68,68,0);  }
    100% { box-shadow: 0 0 0 0   rgba(239,68,68,0);   }
  }
  @keyframes spin-glow {
    from { box-shadow: 0 0 12px rgba(99,102,241,.4), 0 0 0 2px var(--accent); }
    50%  { box-shadow: 0 0 24px rgba(99,102,241,.7), 0 0 0 2px var(--accent2); }
    to   { box-shadow: 0 0 12px rgba(99,102,241,.4), 0 0 0 2px var(--accent); }
  }
  .mic-status { font-size: 13px; color: var(--muted); font-weight: 500; }
  .mic-status.live  { color: var(--danger); }
  .mic-status.proc  { color: var(--accent2); }

  /* ── Waveform ── */
  .waveform-bar {
    display: flex; align-items: center; gap: 3px; height: 28px;
    opacity: 0; transition: opacity .3s;
  }
  .waveform-bar.active { opacity: 1; }
  .waveform-bar span {
    display: block; width: 3px; border-radius: 99px;
    background: var(--danger); min-height: 4px;
    transition: height .08s ease;
  }

  /* ── Live transcript box ── */
  .live-box {
    margin-top: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    min-height: 60px;
    font-size: 14px; line-height: 1.6; color: var(--text);
    font-style: italic; color: var(--muted);
    transition: border-color .2s;
  }
  .live-box.has-text { color: var(--text); font-style: normal; }
  .live-box.recording-active { border-color: rgba(239,68,68,.4); }

  /* ── Controls row ── */
  .controls-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn {
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid transparent; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-danger { background: rgba(239,68,68,.12); color: var(--danger); border-color: rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── AI mode pills ── */
  .mode-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .mode-pill {
    padding: 5px 12px; border-radius: 99px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    transition: all .15s;
  }
  .mode-pill.active { background: rgba(99,102,241,.15); border-color: var(--accent); color: var(--accent2); }
  .mode-pill:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Options ── */
  .options-row {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 10px 28px 0;
    font-size: 12.5px; color: var(--muted);
  }
  .toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle {
    width: 34px; height: 19px; border-radius: 99px; background: var(--border);
    position: relative; cursor: pointer; transition: background .2s;
    border: none; outline: none;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: ''; position: absolute;
    top: 2px; left: 2px; width: 15px; height: 15px;
    background: #fff; border-radius: 50%;
    transition: transform .2s;
  }
  .toggle.on::after { transform: translateX(15px); }

  /* ── History list ── */
  .history-area {
    flex: 1; overflow-y: auto; padding: 16px 28px;
  }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .history-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
  .history-count { font-size: 11px; color: var(--muted); }
  .history-empty {
    text-align: center; padding: 48px 20px;
    color: var(--muted); font-size: 14px; line-height: 1.6;
  }
  .history-empty .icon { font-size: 40px; margin-bottom: 10px; opacity: .4; }

  /* ── History card ── */
  .h-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color .15s, transform .15s;
    cursor: default;
  }
  .h-card:hover { border-color: rgba(99,102,241,.4); transform: translateY(-1px); }
  .h-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .h-card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .h-tag {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
    letter-spacing: .04em; text-transform: uppercase;
  }
  .h-tag.raw    { background: rgba(107,108,120,.2); color: var(--muted); }
  .h-tag.clean  { background: rgba(99,102,241,.15); color: var(--accent2); }
  .h-tag.bullet { background: rgba(34,197,94,.12);  color: var(--green);   }
  .h-tag.email  { background: rgba(245,158,11,.12); color: var(--amber);   }
  .h-card-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .h-card-body { font-size: 13.5px; line-height: 1.65; color: var(--text); word-break: break-word; }
  .h-card-actions { display: flex; gap: 6px; margin-top: 10px; }
  .h-btn {
    padding: 4px 10px; border-radius: 6px;
    font-size: 11.5px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    transition: all .15s;
  }
  .h-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .h-btn.copied { color: var(--green); border-color: var(--green); }
  .h-btn.del { color: var(--danger); border-color: rgba(239,68,68,.25); }
  .h-btn.del:hover { background: rgba(239,68,68,.08); }

  /* ── Settings panel ── */
  .panel {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .panel.open { opacity: 1; pointer-events: all; }
  .panel-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: min(520px, 94vw);
    max-height: 88vh;
    overflow-y: auto;
    padding: 28px;
    box-shadow: var(--shadow);
    transform: translateY(12px);
    transition: transform .2s;
  }
  .panel.open .panel-box { transform: translateY(0); }
  .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 22px; display: flex; justify-content: space-between; align-items: center; }
  .panel-close { font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; padding: 2px 6px; border-radius: 6px; background: none; border: none; }
  .panel-close:hover { color: var(--text); background: var(--surface2); }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 0; border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 13.5px; font-weight: 500; }
  .setting-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .select-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    padding: 6px 10px; font-size: 13px; cursor: pointer;
    outline: none; font-family: var(--font-ui);
  }
  .select-input:focus { border-color: var(--accent); }
  .shortcut-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 10px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text);
    white-space: nowrap;
  }
  .api-input {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    padding: 8px 12px; font-size: 13px; font-family: var(--font-mono);
    outline: none; margin-top: 8px;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-save { margin-top: 10px; }
  .info-box {
    background: rgba(99,102,241,.08);
    border: 1px solid rgba(99,102,241,.2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12.5px; color: var(--accent2); line-height: 1.6;
    margin-top: 16px;
  }

  /* ── Floating mic widget (Wispr-style) ── */
  .float-widget {
    position: fixed; bottom: 32px; right: 32px;
    z-index: 200;
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
  }
  .float-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    min-width: 240px;
    opacity: 0; pointer-events: none;
    transform: translateY(10px) scale(.96);
    transition: all .2s ease;
  }
  .float-card.visible { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  .float-transcript { font-size: 13px; flex: 1; color: var(--text); font-style: italic; color: var(--muted); }
  .float-transcript.has-text { color: var(--text); font-style: normal; }
  .float-mic {
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer; color: #fff;
    box-shadow: var(--glow);
    transition: all .2s; outline: none;
    flex-shrink: 0;
  }
  .float-mic:hover { transform: scale(1.06); box-shadow: 0 0 28px rgba(99,102,241,.5); }
  .float-mic.recording { background: linear-gradient(135deg, #EF4444, #F87171); animation: pulse-ring 1.4s ease infinite; }
  .float-mic.processing { animation: spin-glow 1s linear infinite; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px;
    font-size: 13.5px; font-weight: 500; color: var(--text);
    box-shadow: var(--shadow); z-index: 999;
    opacity: 0; transition: all .25s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error   { border-color: var(--danger); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── Mobile ── */
  @media(max-width: 640px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); z-index: 50; }
    .sidebar.mobile-open { transform: translateX(0); }
    .float-widget { bottom: 20px; right: 20px; }
    .record-zone { padding: 20px 16px 12px; }
    .history-area { padding: 12px 16px; }
    .options-row { padding: 10px 16px 0; }
  }

  /* ── Animations ── */
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- ── Toast ─────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── Settings Panel ────────────────── -->
<div class="panel" id="settingsPanel">
  <div class="panel-box">
    <div class="panel-title">
      Settings
      <button class="panel-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Groq API Key</div>
        <div class="setting-desc">Used for AI cleanup. Free tier: 6000 req/min.</div>
        <input class="api-input" type="password" id="apiKeyInput" placeholder="gsk_..." />
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="btn btn-primary api-save" onclick="saveApiKey()">Save Key</button>
          <button class="btn btn-secondary" onclick="clearApiKey()">Clear</button>
        </div>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Keyboard Shortcut</div>
        <div class="setting-desc">Hold to record, release to transcribe</div>
      </div>
      <span class="shortcut-badge" id="shortcutBadge">Space (hold)</span>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Language</div>
        <div class="setting-desc">Transcription language</div>
      </div>
      <select class="select-input" id="langSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="auto">Auto-detect</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
        <option value="ar">Arabic</option>
        <option value="pt">Portuguese</option>
        <option value="ja">Japanese</option>
      </select>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Auto-copy to clipboard</div>
        <div class="setting-desc">Copy result immediately after transcription</div>
      </div>
      <button class="toggle" id="toggleAutoCopy" onclick="toggleSetting('autoCopy', this)"></button>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Floating widget</div>
        <div class="setting-desc">Show floating mic button on screen</div>
      </div>
      <button class="toggle on" id="toggleFloat" onclick="toggleSetting('floatWidget', this)"></button>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Dark mode</div>
        <
